<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favorble — Floating Panel Sidebar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #FAFAFA;
    color: #111;
    -webkit-font-smoothing: antialiased;
  }

  .layout {
    display: flex;
    height: 100vh;
    position: relative;
  }

  /* ── Floating sidebar panel ── */
  .sidebar-wrapper {
    flex-shrink: 0;
    width: calc(220px + 12px + 12px);
    padding: 12px 0 12px 12px;
    position: relative;
    z-index: 10;
  }

  .sidebar {
    width: 220px;
    height: 100%;
    background: #FFFFFF;
    border: 1px solid #EAEAEA;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Logo area ── */
  .sidebar-logo {
    padding: 16px 14px 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-monogram {
    width: 12px;
    height: 12px;
    background: #000;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-monogram span {
    color: #FFF;
    font-size: 8px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .logo-text {
    font-size: 14px;
    font-weight: 600;
    color: #000;
    letter-spacing: -0.01em;
  }

  /* ── Search trigger ── */
  .search-trigger {
    margin: 12px 14px 0 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #F5F5F5;
    border-radius: 6px;
    padding: 6px 8px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .search-trigger:hover {
    background: #EFEFEF;
  }

  .search-placeholder {
    font-size: 11px;
    color: #999;
  }

  .search-badge {
    font-size: 10px;
    font-family: 'Geist', monospace;
    color: #999;
    background: #EAEAEA;
    border-radius: 4px;
    padding: 1px 5px;
    line-height: 1.4;
  }

  /* ── Nav sections ── */
  .nav-sections {
    flex: 1;
    overflow-y: auto;
    padding: 12px 10px 0 10px;
  }

  .nav-section + .nav-section {
    border-top: 1px solid #F0F0F0;
    margin-top: 12px;
    padding-top: 12px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 13px;
    color: #555;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease;
    position: relative;
    gap: 8px;
  }

  .nav-item:hover {
    background: #F5F5F5;
  }

  .nav-item.active {
    background: #F0F0F0;
    color: #000;
    font-weight: 500;
  }

  .nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 14px;
    background: #000;
    border-radius: 2px;
  }

  .nav-item-icon {
    width: 15px;
    height: 15px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-item-icon svg {
    width: 15px;
    height: 15px;
    stroke-width: 1.6;
  }

  .nav-item-label {
    flex: 1;
    min-width: 0;
  }

  .nav-badge {
    font-family: 'Geist', monospace;
    font-size: 10px;
    color: #666;
    background: #F0F0F0;
    border-radius: 10px;
    padding: 1px 7px;
    line-height: 1.5;
    flex-shrink: 0;
  }

  /* ── User area ── */
  .sidebar-user {
    border-top: 1px solid #F0F0F0;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.12s ease;
  }

  .sidebar-user:hover {
    background: #FAFAFA;
  }

  .user-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #EAEAEA;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .user-avatar span {
    font-size: 10px;
    font-weight: 600;
    color: #666;
  }

  .user-name {
    flex: 1;
    font-size: 12px;
    color: #555;
  }

  .user-chevron {
    flex-shrink: 0;
    color: #CCC;
  }

  .user-chevron svg {
    width: 12px;
    height: 12px;
  }

  /* ── Main content ── */
  .main {
    flex: 1;
    min-width: 0;
    padding: 24px 32px;
    overflow-y: auto;
  }

  .main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .main-header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #000;
    letter-spacing: -0.01em;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    font-family: 'Geist', sans-serif;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid #EAEAEA;
    background: #FFF;
    color: #555;
    cursor: pointer;
    transition: background 0.12s ease, border-color 0.12s ease;
  }

  .btn:hover {
    background: #F5F5F5;
    border-color: #DDD;
  }

  .btn-primary {
    background: #000;
    color: #FFF;
    border-color: #000;
  }

  .btn-primary:hover {
    background: #222;
    border-color: #222;
  }

  /* ── Dashboard cards ── */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: #FFF;
    border: 1px solid #EAEAEA;
    border-radius: 6px;
    padding: 16px;
  }

  .stat-label {
    font-size: 11px;
    color: #999;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 600;
    color: #000;
    letter-spacing: -0.02em;
  }

  .content-card {
    background: #FFF;
    border: 1px solid #EAEAEA;
    border-radius: 6px;
    margin-bottom: 16px;
  }

  .content-card-header {
    padding: 14px 16px;
    border-bottom: 1px solid #F0F0F0;
    font-size: 13px;
    font-weight: 500;
    color: #000;
  }

  .content-card-body {
    padding: 16px;
  }

  .placeholder-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
  }

  .placeholder-row + .placeholder-row {
    border-top: 1px solid #F5F5F5;
  }

  .placeholder-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #EAEAEA;
    flex-shrink: 0;
  }

  .placeholder-bar {
    height: 8px;
    border-radius: 4px;
    background: #F5F5F5;
  }

  .placeholder-bar.w1 { width: 140px; }
  .placeholder-bar.w2 { width: 100px; }
  .placeholder-bar.w3 { width: 180px; }
  .placeholder-bar.w4 { width: 120px; }
  .placeholder-bar.w5 { width: 90px; }

  .placeholder-badge {
    margin-left: auto;
    width: 48px;
    height: 18px;
    border-radius: 10px;
    background: #F5F5F5;
    flex-shrink: 0;
  }
</style>
</head>
