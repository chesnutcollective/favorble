version: "3.9"
services:
  ere-orchestrator:
    build:
      context: ./services/ere-orchestrator
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY}
      - ERE_BROWSER_URL=http://ere-browser:3001

  ere-browser:
    build:
      context: ./services/ere-browser
    ports:
      - "3001:3001"
    volumes:
      - ere-data:/app/data
    environment:
      - ORCHESTRATOR_URL=http://ere-orchestrator:3000
      - BROWSER_POOL_SIZE=2
    shm_size: "2gb"

  ere-cron:
    build:
      context: ./services/ere-cron
    environment:
      - ORCHESTRATOR_URL=http://ere-orchestrator:3000
      - ORCHESTRATOR_API_KEY=${ORCHESTRATOR_API_KEY}

volumes:
  ere-data:
